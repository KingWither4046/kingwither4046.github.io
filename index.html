<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mateo the MONER Local HTML File Runner</title>
  <style>
    body {
      font-family: Arial, sans-serif;

    input[type="file"] {
      margin-top: 20px;
    }
    button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>      margin: 40px;
      background-color: #f0f0f0;
      text-align: center;
    }
    h1 {
      color: #333;
    }
<body>
  <h1>Run Local HTML File in New Tab</h1>
  <input type="file" id="htmlFile" accept=".html,.htm">
  <br>
  <button onclick="openHTMLFile()">Open in New Tab</button>

  <script>
    function openHTMLFile() {
      const fileInput = document.getElementById('htmlFile');
      const file = fileInput.files[0];

      if (!file) {
        alert('Please choose an HTML file first.');
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        const htmlContent = e.target.result;
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const url = URL.createObjectURL(blob);

        window.open(url, '_blank');
      };

      reader.readAsText(file);
    }
  </script>
</body>
</html>
